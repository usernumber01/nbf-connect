# NBF Connect — Netlify Configuration
# HTTPS enforced via 301 redirect
# Security headers applied to all routes
# hCaptcha domains whitelisted in CSP

[[redirects]]
  from = "http://aquamarine-parfait-776a6b.netlify.app/*"
  to = "https://aquamarine-parfait-776a6b.netlify.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://*.netlify.app/*"
  to = "https://:host/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://apis.google.com https://*.firebaseapp.com https://*.googleapis.com https://www.hcaptcha.com https://*.hcaptcha.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://www.hcaptcha.com https://*.hcaptcha.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com data:; img-src 'self' data: blob: https: http:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://identitytoolkit.googleapis.com wss://*.firebaseio.com https://firestore.googleapis.com https://storage.googleapis.com; frame-src https://www.hcaptcha.com https://*.hcaptcha.com https://*.firebaseapp.com;"

[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/404"
  to = "/index.html"
  status = 200
