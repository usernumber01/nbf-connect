# NBF Connect — Netlify Configuration
# HTTPS enforced via 301 redirect
# Security headers applied to all routes
# hCaptcha domains whitelisted in CSP

[[redirects]]
  from = "http://aquamarine-parfait-776a6b.netlify.app/*"
  to = "https://aquamarine-parfait-776a6b.netlify.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://*.netlify.app/*"
  to = "https://:host/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://www.google.com https://hcaptcha.com https://*.hcaptcha.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://hcaptcha.com https://*.hcaptcha.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com wss://*.firebaseio.com https://hcaptcha.com; frame-src https://www.google.com https://hcaptcha.com https://*.hcaptcha.com"

[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/404"
  to = "/index.html"
  status = 200
