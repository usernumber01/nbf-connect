<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | NBF Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .verify-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #0d1117;
            padding: 2rem;
            text-align: center;
        }
        .verify-box {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
        }
        .verify-icon {
            font-size: 4rem;
            color: #f49f1c;
            margin-bottom: 1.5rem;
        }
        .verify-title {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1rem;
            font-family: 'Outfit', sans-serif;
        }
        .verify-text {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn-verify {
            display: inline-block;
            background: linear-gradient(135deg, #f49f1c, #e08e15);
            color: #000;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-verify:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(244, 159, 28, 0.3);
        }
    </style>
  <link rel="stylesheet" crossorigin href="/assets/login-AVnQeEHc.css">
</head>
<body>

    <div class="verify-wrapper">
        <div class="verify-box">
            <i class="fas fa-envelope-open-text verify-icon"></i>
            <h1 class="verify-title">Check Your Inbox</h1>
            <p class="verify-text">We've sent a verification link to your email address. Please verify your email to activate your account and continue your mission.</p>
            <a href="/login.html" class="btn-verify">Proceed to Login</a>
        </div>
    </div>

</body>
</html>
